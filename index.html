<div id="profile-settings" class="post-form">
    <h3>Налаштування профілю (｡· v ·｡)</h3>
    <input type="text" id="username-input" placeholder="Твій нікнейм">
    <label for="avatar-input">Аватарка:</label>
    <input type="file" id="avatar-input" accept="image/*">
    <button onclick="saveProfile()">Зберегти</button>
</div>

<script>
    function saveProfile() {
        const nick = document.getElementById('username-input').value;
        const avatarFile = document.getElementById('avatar-input').files[0];
        
        if (nick) localStorage.setItem('user_nickname', nick);
        
        if (avatarFile) {
            const reader = new FileReader();
            reader.onload = function(e) {
                localStorage.setItem('user_avatar', e.target.result);
                alert("Профіль оновлено!");
                location.reload();
            };
            reader.readAsDataURL(avatarFile);
        } else {
            alert("Нік збережено!");
            location.reload();
        }
    }

    function updateUI() {
        const nick = localStorage.getItem('user_nickname') || "Анонім";
        const avatar = localStorage.getItem('user_avatar');
        const welcomeMsg = document.getElementById('welcome-msg');
        
        welcomeMsg.innerHTML = `Привітики, ${nick}! <br>`;
        if (avatar) {
            welcomeMsg.innerHTML += `<img src="${avatar}" style="width:50px; height:50px; border-radius:50%; margin-top:10px;">`;
        }
    }
    updateUI();
</script>

    <script>
        // Функція для оновлення інтерфейсу
        function updateUI() {
            const user = localStorage.getItem('user_login');
            const welcomeMsg = document.getElementById('welcome-msg');
            const upravSection = document.getElementById('uprav-section');
            const loginSection = document.getElementById('login-section');

            if (user && user !== "") {
                // Якщо користувач залогінений
                welcomeMsg.innerText = "привітики ( ˶°ㅁ°) !! " + user + " :3";
                upravSection.style.display = "block"; // Показуємо керування
                loginSection.style.display = "none";  // Ховаємо "увійти"
            } else {
                // Якщо користувач НЕ залогінений (Анонім)
                welcomeMsg.innerText = "привіт, Аноніме! увійди в акаунт щоб ніхто не міг видаляти твої вітповіді і пости + для аватарочок (｡· v ·｡)";
                upravSection.style.display = "none";  // Ховаємо керування
                loginSection.style.display = "block"; // Показуємо "увійти"
            }
        }

        // Запускаємо перевірку відразу після завантаження сторінки
        window.onload = updateUI;
    </script>
