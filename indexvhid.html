<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styly.css">
    <title>vhid</title>
</head>
<body>

    <a class="back" href="index.html">назад</a>
    <h1 class="register">вхід на цій сторінці</h1>
    <a href="indexregister.html">зареєструватися</a>
    <p>логін</p>
    <input type="text" name="" id="">

    <p>пароль</p>
    <input type="password" name="" id="">

     <div></div>
    <button onclick="login()">увійти</button>

<script>
function login() {
    const loginInput = document.querySelector('input[type="text"]').value;
    const passInput = document.querySelector('input[type="password"]').value;
    
    const savedLogin = localStorage.getItem('user_login');
    const savedPass = localStorage.getItem('user_pass');

    if(loginInput === savedLogin && passInput === savedPass) {
        alert('ти увійшов в обліковий запис');
        window.location.href = 'index.html';
    } else {
        alert('Невірний логін або пароль!');
    }
}
</script>
   </div>
    
</body>
</html>
