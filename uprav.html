    <div>
        <a class="back" href="index.html">назад</a>
    <h1 class="zagolog">  керегуваня акаунтом   </h1>
</div>

<button onclick="logout()">вийти з акаунту</button>
<button onclick="deleteAccount()">видалити акаунт</button>

<script>
function logout() {
    localStorage.removeItem('user_login'); // Видаляємо тільки сесію
    alert('ти вийшов з акаунту');
    window.location.href = 'index.html';
}

function deleteAccount() {
    localStorage.clear(); // Видаляємо все: і логін, і пароль
    alert('ти видалив акаунт');
    window.location.href = 'index.html';
}
</script>

    <h2>
